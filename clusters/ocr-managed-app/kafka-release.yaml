apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kafka
  namespace: flux-system
spec:
  interval: 10m
  releaseName: kafka
  targetNamespace: kafka
  install:
    createNamespace: true
  chartRef:
    kind: OCIRepository
    name: kafka
    namespace: flux-system
  values:
    controller:
      replicaCount: 3
      persistence:
        enabled: false   # toggle here to switch PVC on/off; existing PVCs are NOT auto-deleted, see note below
    # Bitnami retired free docker.io/bitnami/* images in 2025; the frozen,
    # still-free mirror of the last published tags lives under bitnamilegacy.
    image:
      repository: bitnamilegacy/kafka
