apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kafka
  namespace: flux-system
spec:
  interval: 10m
  releaseName: kafka
  targetNamespace: kafka
  install:
    createNamespace: true
  chartRef:
    kind: OCIRepository
    name: kafka
    namespace: flux-system
  values:
    replicaCount: 1
    persistence:
      size: 8Gi
